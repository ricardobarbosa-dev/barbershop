{% extends 'accounts/base.html' %}
{% load static %}

{% block content %}
  <link rel="stylesheet" href="{% static 'accounts/css/login.css' %}" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

  <div class="login-container">
    <div class="login-header">
      <div class="logo-circle">
        <i class="fas fa-scissors"></i>
      </div>
      <h1>RECUPERAR<span>SENHA</span></h1>
      <p class="subtitle">Enviaremos um link para o seu e-mail</p>
    </div>

    <form method="POST" class="login-form">
      {% csrf_token %}
      <div class="input-group">
        <label>E-MAIL CADASTRADO</label>
        <div class="input-wrapper">
          <i class="far fa-envelope"></i>
          <input type="email" name="email" placeholder="seu@email.com" required />
        </div>
      </div>

      <button type="submit" class="btn-primary" style="font-weight: bold; padding: 1.2rem; width: 100%; justify-content: center;"><i class="fas fa-arrow-right"></i>ENVIAR LINK DE RECUPERAÇÃO</button>

      <p class="footer-text" style="margin-top: 20px;">
        Lembrou a senha? <a href="{% url 'login' %}">Entrar</a>
      </p>
    </form>
  </div>
{% endblock %}
