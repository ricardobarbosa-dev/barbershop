{% extends 'accounts/base.html' %}
{% load static %}

{% block content %}
  <link rel="stylesheet" href="{% static 'accounts/css/login.css' %}" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

  <div class="login-container">
    <div class="login-header">
      <div class="logo-circle">
        <i class="fas fa-check"></i>
      </div>
      <h1>SENHA<span>ALTERADA</span></h1>
      <p class="subtitle">Tudo pronto! Sua conta está segura.</p>
    </div>

    <div class="login-form" style="text-align: center; color: #ccc;">
      <p style="margin-bottom: 30px; line-height: 1.6;">
        Sua nova senha foi definida com sucesso. <br />
        Agora você já pode acessar sua área exclusiva.
      </p>

      <a href="{% url 'login' %}" class="btn-primary" style="display: block; text-decoration: none; font-weight: bold; padding: 1.2rem;  justify-content: center;">ACESSAR MINHA CONTA</a>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof createToast === 'function') {
        createToast('Senha atualizada com sucesso! 🎉', 'success')
      }
    })
  </script>
{% endblock %}
